services:
  rethinkdb:
    container_name: rethinkdb
    image: rethinkdb:2.4.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:28015:28015"
    volumes:
        - "rethinkdb-data:/data"
    command: "rethinkdb --bind all --cache-size 2048"

  adb:
    container_name: adb
    image: devicefarmer/adb:latest
    restart: unless-stopped
    volumes: 
      - "/dev/bus/usb:/dev/bus/usb"
    privileged: true

  stf:
    container_name: stf
    build:
      context: .
      dockerfile: Dockerfile
    image: stf-local:dev
    ports:
      - "7100:7100"
      - "7110:7110"
      - "7400-7500:7400-7500"
    environment:
      - TZ=America/Los_Angeles
      - RETHINKDB_PORT_28015_TCP=tcp://rethinkdb:28015
      - STF_ADMIN_EMAIL=${STF_ADMIN_EMAIL:-administrator@fakedomain.com}
      - STF_ADMIN_NAME=${STF_ADMIN_NAME:-administrator}
    restart: unless-stopped
    command: stf local --adb-host ${STF_ADB_HOST:-adb} --public-ip ${STF_PUBLIC_IP:-localhost} --provider-min-port 7400 --provider-max-port 7500 --enable-flash-samsung --flash-samsung-execution-backend mac-dev-local --flash-samsung-execution-mode dry-run --flash-samsung-allow-mac-dev-local

volumes:
  rethinkdb-data: {}
